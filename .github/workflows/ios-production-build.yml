name: iOS Production Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 90
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - run: npm install

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
          packager: npm

      - name: Write ASC API Key
        env:
          ASC_KEY: ${{ secrets.ASC_API_KEY }}
        run: printf '%s\n' "$ASC_KEY" > /tmp/asc-key.p8

      - name: Build iOS production IPA
        env:
          EXPO_ASC_API_KEY_PATH: /tmp/asc-key.p8
          EXPO_ASC_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          EXPO_ASC_ISSUER_ID: ${{ secrets.ASC_API_KEY_ISSUER_ID }}
          EXPO_APPLE_TEAM_ID: P9M7A74M6C
          EXPO_APPLE_TEAM_TYPE: INDIVIDUAL
        run: eas build --platform ios --profile production --local --non-interactive --output venn-production.ipa

      - uses: actions/upload-artifact@v4
        with:
          name: ios-production-build
          path: mobile/venn-production.ipa
          retention-days: 30
